<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Baker's Recipe Scaler</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-amber-50 text-slate-800 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl max-w-md w-full border border-amber-100">
        <h1 class="text-2xl font-bold text-center text-amber-700 mb-1">🎂 Anytime Cakes by Chithrani</h1>
        <p class="text-xs text-center text-slate-400 mb-6">Dynamic Recipe Scaler Engine</p>

        <!-- Configuration Form Elements -->
        <form action="/" method="GET" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Select Cake Type</label>
                <select name="cake_type" onchange="this.form.submit()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500">
                    {% for cake in cakes %}
                    <option value="{{ cake }}" {% if cake == selected_cake %}selected{% endif %}>{{ cake }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Target Weight (kg)</label>
                <div class="flex gap-2">
                    <input type="number" name="weight" step="0.05" min="0.1" max="50" value="{{ weight }}" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500">
                    <button type="submit" class="bg-amber-600 hover:bg-amber-700 text-white font-medium px-5 rounded-xl transition">Scale</button>
                </div>
            </div>
        </form>

        <hr class="my-6 border-slate-100">

        <!-- Display Output Parameters -->
        <div>
            <h3 class="font-semibold text-base text-slate-700 mb-3">Required Ingredients for {{ weight }}kg:</h3>
            <ul class="space-y-2">
                {% for item in ingredients %}
                <li class="flex justify-between items-center bg-amber-50/40 px-4 py-2.5 rounded-xl border border-amber-100/30">
                    <span class="font-medium text-slate-700">{{ item.name }}</span>
                    <span class="bg-amber-700 text-white text-xs font-bold px-3 py-1 rounded-md">{{ item.qty }}</span>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>

</body>
</html>
